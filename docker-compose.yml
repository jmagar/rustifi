name: rustifi

# Local development stack. Builds from this checkout.
services:
  unifi-mcp:
    extends:
      file: docker-compose.prod.yml
      service: unifi-mcp
    image: rustifi:dev
    pull_policy: build
    build:
      context: .
      dockerfile: config/Dockerfile

networks:
  rustifi:
    name: ${DOCKER_NETWORK:-rustifi}
    external: true
